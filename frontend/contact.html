<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <nav class="navbar">
        <div class="container nav-container">
            <div class="nav-logo">
                <a href="index.html"><i class="fa-solid fa-scale-balanced"></i> E-Governance PORTAL</a>
            </div>            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <main class="container form-section" style="flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem 0;">
        <div class="form-card" style="width: 100%; max-width: 500px;"> <h2>Contact Us</h2>
            <div id="contactAlert" class="alert"></div>
            <form id="contactForm">
                <div class="form-group">
                    <label for="cName">Full Name</label>
                    <input type="text" id="cName" placeholder="Enter Your Full Name" required>
                </div>
                <div class="form-group">
                    <label for="cEmail"> Email</label>
                    <input type="email" id="cEmail" placeholder="Enter Your Email Address" required>
                </div>
                <div class="form-group">
                    <label for="cMsg">Description</label>
                    <textarea id="cMsg" rows="4" placeholder="Send Message" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Submit</button>
            </form>
            
            <div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--light-gray); font-size:0.9rem; color:#555;">      
            </div>
        </div>
    </main>

</body> 
</html>
