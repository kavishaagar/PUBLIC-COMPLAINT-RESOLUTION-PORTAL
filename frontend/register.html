<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REGISTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
<div class="nav-logo">
                <a href="index.html"><i class="fa-solid fa-scale-balanced"></i> E-Governance PORTAL</a>
            </div>            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" class="btn btn-outline">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="form-section">
        <div class="form-card form-card-wide">
            <h2>REGISTRATION</h2>
            <div id="regAlert" class="alert"></div>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" placeholder="Enter full  name" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="regMobile">Mobile Number</label>
                        <input type="tel" id="regMobile" placeholder="10-digit number" required>
                    </div>
                    <div class="form-group">
                        <label for="regAddress">Residential Address</label>
                        <input type="text" id="regAddress" placeholder="Current address details" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="regPass">Create Password</label>
                        <input type="password" id="regPass" placeholder="Min 6 characters" required>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPass">Confirm  Password</label>
                        <input type="password" id="regConfirmPass" placeholder="Re-type password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Create Profile</button>
            </form>
        </div>
    </section>

</body>
</html>
