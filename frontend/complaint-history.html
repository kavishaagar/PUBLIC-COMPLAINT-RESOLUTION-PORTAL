<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complaint-history</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="script.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="nav-logo">
                <a href="index.html"><i class="fa-solid fa-scale-balanced"></i> E-Governance PORTAL</a>
            </div>
            <ul class="nav-links">
                <li><a href="user-dashboard.html">Back to Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding:3rem 0; flex:1;">
        <h2 class="section-title" style="text-align:left; margin-bottom:1.5rem;">Submitted History</h2>
        
        <div class="filter-bar">
            <div class="form-group">
                <label for="searchQuery">Enter Complaint ID </label>
                <input type="text" id="searchQuery" placeholder=" Enter Token ID ....">
            </div>
            <div class="form-group">
                <label for="filterStatus">Select Category</label>
                <select id="filterStatus">
                    <option value="All">All </option>
                    <option value="Pending">Pending </option>
                    <option value="Resolved">Resolved</option>
                    <option value="Progress">In Progress</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th> Token ID</th>
                        <th>Department </th>
                        <th>Complaint Type</th>
                        <th>Timestamp</th>
                        <th>Execution Status</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    </tbody>
            </table>
        </div>
    </main>

</body>
</html>
