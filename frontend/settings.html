<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

<script src="script.js" defer></script>

</head>

<body>

<nav class="navbar">

<div class="container nav-container">

<div class="nav-logo">
<a href="admin-dashboard.html">
<i class="fa-solid fa-user-shield"></i>
Admin Portal
</a>
</div>

<ul class="nav-links">

<li>
<a href="admin-dashboard.html">
Dashboard
</a>
</li>

<li>
<a href="settings.html" class="active">
Settings
</a>
</li>

<li>
<button onclick="logout()" class="btn btn-danger">
Logout
</button>
</li>

</ul>

</div>

</nav>

<main class="container dashboard-sec">

    <h2 class="section-title"
    style="text-align:left; margin-bottom:2rem;">
        Portal Settings
    </h2>

    <form id="settingsForm" class="settings-grid">

        <!-- Portal Information -->
        <div class="settings-card">
            <h3><i class="fa-solid fa-globe"></i> Portal Information</h3>

            <div class="form-group">
                <label>Portal Name</label>
                <input type="text"
                id="portalName"
                value="Public Complaint Resolution Portal">
            </div>

            <div class="form-group">
                <label>Portal Description</label>
                <textarea id="portalDescription" rows="4">Online platform for public grievance submission and resolution.</textarea>
            </div>
        </div>

        <!-- Contact Information -->
        <div class="settings-card">
            <h3><i class="fa-solid fa-address-book"></i> Contact Information</h3>

            <div class="form-group">
                <label>Support Email</label>
                <input type="email"
                id="portalEmail"
                value="support@pcrp.gov.in">
            </div>

            <div class="form-group">
                <label>Support Number</label>
                <input type="text"
                id="supportNumber"
                value="+91 9876543210">
            </div>

            <div class="form-group">
                <label>Office Address</label>
                <textarea id="officeAddress" rows="3">District Administrative Office</textarea>
            </div>
        </div>

        <!-- Complaint Settings -->
        <div class="settings-card">
            <h3><i class="fa-solid fa-file-circle-exclamation"></i> Complaint Settings</h3>

            <div class="form-group">
                <label>Maximum Resolution Days</label>
                <input type="number"
                id="resolutionDays"
                value="30">
            </div>

            <div class="form-group">
                <label>Allow Evidence Upload</label>
                <select id="allowEvidence">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>

        <!-- User Settings -->
        <div class="settings-card">
            <h3><i class="fa-solid fa-users"></i> User Registration</h3>

            <div class="form-group">
                <label>Allow New Registrations</label>
                <select id="allowRegistration">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email Verification Required</label>
                <select id="emailVerification">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>

        <!-- Notification Settings -->
        <div class="settings-card">
            <h3><i class="fa-solid fa-bell"></i> Notifications</h3>

            <div class="form-group">
                <label>Email Notifications</label>
                <select id="emailNotifications">
                    <option value="Enabled">Enabled</option>
                    <option value="Disabled">Disabled</option>
                </select>
            </div>

            <div class="form-group">
                <label>SMS Notifications</label>
                <select id="smsNotifications">
                    <option value="Enabled">Enabled</option>
                    <option value="Disabled">Disabled</option>
                </select>
            </div>
        </div>

        <!-- Security Settings -->
        <div class="settings-card">
            <h3><i class="fa-solid fa-shield-halved"></i> Security</h3>

            <div class="form-group">
                <label>Admin Session Timeout</label>
                <input type="number"
                id="sessionTimeout"
                value="30">
            </div>

            <div class="form-group">
                <label>Enable Login Audit Logs</label>
                <select id="auditLogs">
                    <option value="Enabled">Enabled</option>
                    <option value="Disabled">Disabled</option>
                </select>
            </div>
        </div>

        <!-- Save Button -->
        <div style="grid-column:1/-1; text-align:center; margin-top:1rem;">
            <button type="submit"
            class="btn btn-primary"
            style="padding:12px 35px;">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Settings
            </button>
        </div>

    </form>

</main>

</body>
</html>
